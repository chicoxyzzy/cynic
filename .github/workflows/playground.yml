name: Deploy playground

# Rebuilds the WebAssembly playground and republishes it to
# `gh-pages:/playground/` whenever the engine, the front-end, or
# the build graph changes on `main`. Keeps the multi-MB
# `cynic.wasm` out of tracked branch history — it is regenerated
# (and `wasm-opt`-minified) from source on every deploy instead of
# hand-committed.
#
# The main-site nav link (`index.html` → `playground/`) is a
# one-time edit on the `gh-pages` branch; this workflow never
# touches anything outside `/playground/`.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'playground/**'
      - 'build.zig'
      - 'build.zig.zon'
      - '.github/workflows/playground.yml'
  workflow_dispatch:

# The publish step pushes a commit to the `gh-pages` branch.
permissions:
  contents: write

# A newer deploy supersedes an in-flight one — no point publishing
# a stale bundle.
concurrency:
  group: deploy-playground
  cancel-in-progress: true

# Opt JavaScript actions into Node 24 ahead of GitHub's 2026-06-16
# forced cutover. Mirrors the env block in `ci.yml`.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    name: Build WASM + publish to gh-pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Audit egress (advisory)
        # Defense-in-depth for the one workflow that has
        # `contents: write` — observes outbound network calls so
        # a future compromised transitive can't exfiltrate the
        # GITHUB_TOKEN silently. Audit mode for now; can flip to
        # block once `allowed-endpoints` is baselined.
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        # No submodules: the WASM build is pure Zig (Perlex regex
        # engine + native Unicode tables); the only submodule is
        # the test262 corpus, which the deploy doesn't need.

      - name: Set up Zig
        uses: xyzzylabs/setup-zig@58626e899b126520afe59a875fb2848cf0774c59  # v1.0.0
        # Version resolved from `build.zig.zon`'s
        # `minimum_zig_version` — single source of truth across
        # this workflow and `.github/workflows/ci.yml`.

      - name: Set up Binaryen (wasm-opt)
        # `zig build wasm` post-processes the module with `wasm-opt -Oz`
        # when it is on PATH (build.zig gates on findProgram), shrinking
        # the published bundle ~13% vs ReleaseSmall alone. Pin a known-
        # good release so the `--enable-bulk-memory-opt` flag the build
        # passes is always recognised (added upstream in version_117).
        run: |
          BINARYEN_VERSION=version_123
          curl -fsSL "https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}/binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz" | tar xz
          echo "$PWD/binaryen-${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Build the playground engine artifacts
        # Emits zig-out/playground/{cynic.wasm, cynic-engine.js} — the
        # engine half of the playground. The website half (index.html,
        # app.js, codemirror.bundle.js) lives committed on the
        # `gh-pages` branch under /playground/ and is preserved across
        # this deploy by `keep_files: true`. The wasm version string is
        # stamped with this commit's SHA.
        run: zig build wasm

      - name: Publish engine artifacts to gh-pages/playground
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./zig-out/playground
          # Scope to the subdir and KEEP existing files: this deploy
          # only refreshes `cynic.wasm` + `cynic-engine.js`; the
          # gh-pages-owned UI (index.html, app.js, codemirror) and the
          # rest of the site are never touched.
          destination_dir: playground
          keep_files: true
          commit_message: 'playground: redeploy engine artifacts from ${{ github.sha }}'
