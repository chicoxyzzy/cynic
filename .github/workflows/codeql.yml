name: CodeQL

# Replaces GitHub's default-setup CodeQL. The default-setup
# autodetector kept spinning up the c-cpp extractor (cached from
# when the repo had vendored QuickJS-NG C in `vendor/quickjs/`),
# even after every .c / .h file was removed — it would index 0
# source files and exit 1. The explicit matrix here pins the
# language list and skips c-cpp cleanly.
#
# Default-setup has been disabled (done at codeql.yml landing time).
# To re-disable if it ever gets re-enabled accidentally, run:
#
#     gh api -X PATCH \
#         repos/chicoxyzzy/cynic/code-scanning/default-setup \
#         -f state=not-configured
#
# (Or Security tab → Code scanning → switch from Default to
# Advanced.) The DELETE verb returns 404 on this endpoint — only
# PATCH with `state=not-configured` works.

on:
  push:
    branches: [main]
    # Mirror ci.yml's paths-ignore: a docs/scoreboard/LICENSE/
    # gh-pages commit doesn't change any code CodeQL scans. The
    # weekly schedule below still runs against the live tree, so
    # query-base updates / new rules still trigger fresh
    # analyses against latest main without needing a code push.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - 'test262-results.md'
      - '.test262-pass-cache.txt'
      - '.gitignore'
      - 'gh-pages/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - 'test262-results.md'
      - '.test262-pass-cache.txt'
      - '.gitignore'
      - 'gh-pages/**'
  schedule:
    # Weekly Tuesday 06:23 UTC — picks up new CodeQL queries
    # (Anthropic's, GitHub's, the security community's) without
    # needing a code change to trigger them.
    - cron: '23 6 * * 2'

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

env:
  # GitHub forces Node 24 on JavaScript actions on 2026-06-16.
  # Opt in early; clears the deprecation warning from CodeQL's
  # own actions (which still ship `using: node20`).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # No c-cpp, no python, no java — Cynic is Zig + a small JS
        # playground front-end. `actions` covers workflow files
        # (catches the same kind of YAML injection the harden-runner
        # step audits at runtime).
        language:
          - actions
          - javascript-typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
