name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel an older in-progress run when a newer push lands. Keeps
# the queue from piling up when the user pushes a flurry of fixes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # No submodules: `zig build` / `zig build test` never read
        # the test262 corpus (the only submodule). The inline
        # `tools/test262/*` tests are pure skip-rule / frontmatter
        # logic. Only the `test262` job below needs the submodule.
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.17.0-dev.305+bdfbf432d

      - name: Show Zig version
        run: zig version

      - name: Build
        run: zig build

      - name: Unit tests
        run: zig build test --summary all

  fmt-check:
    name: zig fmt (advisory)
    runs-on: ubuntu-latest
    # No `needs:` â€” `zig build fmt-check` compiles nothing, it just
    # runs the formatter. Letting it start immediately surfaces a
    # formatting drift without waiting on a full engine build.
    #
    # Advisory: a fail means `zig fmt` would rewrite something
    # under `src/` or `tools/`. Drift slips in from agent edits
    # and patch-by-bash workarounds; surfacing it in PR review is
    # enough today. Local fix: `zig build fmt` rewrites in place.
    # Lift to gating when the source tree is reliably hand-edited.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.17.0-dev.305+bdfbf432d

      - name: zig build fmt-check
        continue-on-error: true
        run: zig build fmt-check

  test262:
    name: test262 conformance + RSS smoke (advisory)
    runs-on: ubuntu-latest
    needs: build-and-test
    # One job builds the ReleaseFast harness once, then runs both
    # the full runtime sweep and the filtered RSS smoke against it â€”
    # the second `zig build test262` reuses the first's `.zig-cache`,
    # so the harness compiles a single time.
    #
    # Both steps are advisory (`continue-on-error`): a fail would
    # mean the harness crashed (panic / SEGV / OOM / timeout), not
    # that the score regressed. Score regressions are reviewed in
    # PRs against `test262-results.md`.
    #
    # Runtime mode is the meaningful signal â€” parser is uniformly
    # â‰¥95% across areas. ReleaseFast + 4 workers (matching the
    # GitHub-hosted runner's vCPUs) targets ~1 min wall-time.
    #
    # We deliberately do NOT auto-commit a refreshed scoreboard â€”
    # that loop is finicky to get right with concurrency policy
    # (the auto-commit triggers a new run that cancels itself,
    # plus paths-ignore on the bot push doesn't always interact
    # cleanly with concurrency: cancel-in-progress). Refresh
    # `test262-results.md` locally with `zig build test262 --
    # --mode=runtime --write-results` and commit it like any
    # other source change.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.17.0-dev.305+bdfbf432d

      - name: Run test262 (runtime, parallel)
        # Drop `--quiet` so the per-bucket tally lands in the CI
        # log. Step timeout caps it in case the harness wedges.
        # `continue-on-error` keeps a cancel / timeout from
        # painting the build red â€” score regressions are reviewed
        # on PRs against `test262-results.md`, not here.
        #
        # `--top-rss=20` surfaces the memory-heaviest fixtures
        # after the tally; pair with the filtered RSS smoke step
        # below to catch leaks at PR time before they reach `main`.
        timeout-minutes: 8
        continue-on-error: true
        run: zig build test262 -- --mode=runtime --threads=4 --top-rss=20

      - name: Filtered sweep with top-rss
        # Advisory leak guard: a filtered runtime sweep reports the
        # heaviest per-fixture RSS deltas via `--top-rss`. Healthy
        # deltas on `language/expressions` are â‰¤ ~20 MiB; a jump
        # almost always means a new allocation path stopped freeing.
        # We deliberately do NOT wrap in `/usr/bin/time -v` â€” that
        # reports the parent `zig build` RSS (â‰ˆ1 GB during link),
        # not the harness, and would always look "leaking."
        #
        # Reuses the harness binary built by the step above (same
        # runner, same `.zig-cache`) â€” no second compile.
        timeout-minutes: 5
        continue-on-error: true
        run: |
          zig build test262 -- --quiet --mode=runtime --threads=4 \
            --filter=language/expressions --top-rss=10

  test262-gc-stress:
    name: test262 GC stress (advisory)
    runs-on: ubuntu-latest
    needs: build-and-test
    # Catches GC rooting / write-barrier regressions that the
    # default `test262` job above CANNOT see: that job builds
    # ReleaseFast, where `Heap.verifyRememberedSet` and the
    # freed-memory poison are compiled out, so a native holding an
    # unrooted pointer across a JS re-entry passes silently.
    #
    # Here the harness is built `-Doptimize=ReleaseSafe`, which arms
    # the remembered-set verifier, and `--gc-threshold=1` collects
    # on every allocation â€” so any rooting hole is a deterministic
    # crash and any un-barriered matureâ†’young store trips the
    # verifier with the offending `(container, field, target)`.
    #
    # NOT a full sweep: under `--gc-threshold=1` the ~600
    # `built-ins/RegExp/property-escapes` fixtures each exceed the
    # per-fixture watchdog (huge generated patterns Ã— per-alloc GC),
    # so a whole-corpus gc1 run is timeout-bound. Instead it probes
    # the GC-mutation-heavy buckets (Array / String / TypedArray) â€”
    # the areas where the rooting contract is most often exercised.
    # See docs/handbook/gc.md ("Finding these bugs").
    #
    # Advisory (`continue-on-error`): a verifier assert or a 0xaa
    # use-after-free crash should surface in PR review, not gate.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.17.0-dev.305+bdfbf432d

      - name: GC stress sweep (ReleaseSafe, --gc-threshold=1)
        # The first invocation builds the ReleaseSafe harness; the
        # rest reuse it from `.zig-cache` (same `-Doptimize`).
        timeout-minutes: 20
        continue-on-error: true
        run: |
          zig build test262 -Doptimize=ReleaseSafe -- \
            --gc-threshold=1 --threads=4 --filter=built-ins/Array
          zig build test262 -Doptimize=ReleaseSafe -- \
            --gc-threshold=1 --threads=4 --filter=built-ins/String
          zig build test262 -Doptimize=ReleaseSafe -- \
            --gc-threshold=1 --threads=4 --filter=built-ins/TypedArray
