name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel an older in-progress run when a newer push lands. Keeps
# the queue from piling up when the user pushes a flurry of fixes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Show Zig version
        run: zig version

      - name: Build
        run: zig build

      - name: Unit tests
        run: zig build test --summary all

  test262:
    name: test262 conformance (advisory)
    runs-on: ubuntu-latest
    needs: build-and-test
    # Advisory: a fail would mean the harness crashed (panic /
    # SEGV / OOM / timeout), not that the score regressed. Score
    # regressions are reviewed in PRs against test262-results.md.
    #
    # Runtime mode is the meaningful signal — parser is uniformly
    # ≥95% across areas. ReleaseFast + 4 workers (matching the
    # GitHub-hosted runner's vCPUs) targets ~1 min wall-time.
    #
    # We deliberately do NOT auto-commit a refreshed scoreboard —
    # that loop is finicky to get right with concurrency policy
    # (the auto-commit triggers a new run that cancels itself,
    # plus paths-ignore on the bot push doesn't always interact
    # cleanly with concurrency: cancel-in-progress). Refresh
    # `test262-results.md` locally with `zig build test262 --
    # --mode=runtime --write-results` and commit it like any
    # other source change.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Run test262 (runtime, parallel)
        # Drop `--quiet` so the per-bucket tally lands in the CI
        # log. Step timeout caps it in case the harness wedges.
        # `continue-on-error` keeps a cancel / timeout from
        # painting the build red — score regressions are reviewed
        # on PRs against `test262-results.md`, not here.
        #
        # `--top-rss=20` surfaces the memory-heaviest fixtures
        # after the tally; pair with the filtered RSS smoke job
        # below to catch leaks at PR time before they reach
        # `main`.
        timeout-minutes: 8
        continue-on-error: true
        run: zig build test262 -- --mode=runtime --threads=4 --top-rss=20

  test262-rss-smoke:
    name: test262 RSS smoke (advisory)
    runs-on: ubuntu-latest
    needs: build-and-test
    # Advisory leak guard: a filtered runtime sweep under
    # `/usr/bin/time -v` posts peak RSS to the job log. The
    # threshold mirrors `AGENTS.md` — healthy is ≤ ~150 MiB for
    # `language/expressions` on the GitHub runner. A jump here
    # almost always means a new allocation path stopped freeing.
    #
    # `continue-on-error` because we don't want a flaky runner
    # to paint PRs red; this is for human review of the printed
    # RSS line.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Filtered sweep with peak RSS
        timeout-minutes: 5
        continue-on-error: true
        run: |
          /usr/bin/time -v zig build test262 -- --quiet \
            --mode=runtime --threads=4 \
            --filter=language/expressions \
            --top-rss=10 2>&1 | tee rss.log
          echo "---"
          echo "Peak RSS line for reviewer:"
          grep -E "Maximum resident set size" rss.log || true
