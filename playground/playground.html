<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#70c0e8" />
<title>Cynic — Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  /* Palette lifted from the Cynic site (gh-pages/index.html) so the
     playground reads as part of the same project. */
  :root {
    --sky: #70c0e8;
    --skin: #ffd521;
    --skin-shade: #e8b800;
    --ink: #0c0c0c;
    --ink-soft: #2a2a2a;
    --bart: #dc4a38;
    --marge: #11a6d6;
    --grass: #6cbf3a;
    --paper: #fff8e6;
    --display: 'Bowlby One', sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --bd: 3px solid var(--ink);
    --bd-thick: 4px solid var(--ink);
    --shadow-sm: 4px 4px 0 var(--ink);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
  }

  body {
    font-family: var(--mono);
    color: var(--ink);
    background: var(--sky);
    background-attachment: fixed;
    padding: 28px 20px 60px;
  }

  .wrap { max-width: 1160px; margin: 0 auto; }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 22px;
  }

  .brand {
    font-family: var(--display);
    font-size: 30px;
    letter-spacing: 0.02em;
  }
  .brand a { color: var(--ink); text-decoration: none; }

  .tag {
    color: var(--ink-soft);
    background: rgba(255, 255, 255, 0.55);
    padding: 2px 6px;
    font-size: 13px;
  }

  /* Toolbar spans the full width above the two-column row. */
  .toolbar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 22px;
  }

  button, select {
    font-family: var(--display);
    font-size: 14px;
    color: var(--ink);
    background: #fff;
    border: var(--bd);
    box-shadow: var(--shadow-sm);
    padding: 8px 14px;
    cursor: pointer;
  }
  button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--ink); }
  button:disabled { opacity: 0.5; cursor: progress; }

  button#run { background: var(--grass); }
  button#share { background: var(--marge); color: #fff; }

  select { font-family: var(--mono); font-size: 13px; box-shadow: none; padding: 7px 10px; }

  label.toggle {
    font-family: var(--mono);
    font-size: 13px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255, 255, 255, 0.6);
    padding: 6px 8px;
    border: 2px solid var(--ink);
    cursor: pointer;
  }

  .status {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-soft);
    margin-left: auto;
  }

  /* The two-column working area: editor left, output right. */
  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
    align-items: stretch;
  }

  .panel {
    background: var(--paper);
    border: var(--bd);
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    min-height: 460px;
  }

  .panel-head {
    font-family: var(--display);
    font-size: 14px;
    letter-spacing: 0.04em;
    background: var(--skin);
    border-bottom: var(--bd);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex: 0 0 auto;
  }

  /* The CodeMirror editor host fills the left panel body. */
  #editor-host {
    flex: 1 1 auto;
    min-height: 0;
    overflow: auto;
  }

  /* CodeMirror theming — see playground.js for the EditorView theme
     that paints the --paper background, --ink text and --marge focus
     accent. The host just needs to let the view stretch. */
  #editor-host .cm-editor { height: 100%; }
  #editor-host .cm-scroller { font-family: var(--mono); }

  pre.output {
    margin: 0;
    padding: 14px;
    flex: 1 1 auto;
    min-height: 0;
    overflow: auto;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .out-stdout { color: var(--ink); }
  .out-value {
    color: var(--ink-soft);
    border-top: 2px dashed rgba(0, 0, 0, 0.25);
    padding-top: 10px;
    margin-top: 10px;
  }
  .out-value::before { content: "⇒ "; color: var(--grass); font-weight: 700; }
  .out-error {
    color: var(--bart);
    font-weight: 700;
    border-top: 2px dashed rgba(220, 74, 56, 0.4);
    padding-top: 10px;
    margin-top: 10px;
  }
  .out-empty { color: var(--ink-soft); font-style: italic; }

  /* Bytecode-inspector disassembly: one element per line. A line
     carrying a [start..end] source span gets `.bc-hot` and lights
     up on hover, paired with a CodeMirror range decoration over
     the matching source. `.bc-active` is the reverse-direction
     highlight (cursor in editor over the span -> light up the
     instruction). */
  .bc-line { display: block; }
  .bc-hot { cursor: pointer; border-radius: 2px; }
  .bc-hot:hover, .bc-active { background: var(--skin); }

  /* Disasm token coloring — same families as the CodeMirror syntax
     palette so the two panels feel like they speak the same
     language. The exact regex sees src/bytecode/disasm.zig output. */
  .bc-tok-offset { color: var(--ink-soft); }
  .bc-tok-mnem   { color: #9b1d8f; font-weight: 700; }
  .bc-tok-reg    { color: #1a64b8; }
  .bc-tok-index  { color: #b5500f; }
  .bc-tok-jump   { color: #0d7a8a; }
  .bc-tok-span   { color: var(--ink-soft); }
  .bc-tok-num    { color: #b5500f; }
  .bc-tok-paren  { color: var(--ink-soft); }

  footer {
    margin-top: 26px;
    font-size: 12px;
    color: var(--ink-soft);
    background: rgba(255, 255, 255, 0.55);
    padding: 8px 10px;
    display: inline-block;
  }
  footer a { color: var(--ink); }

  /* Narrow viewports: collapse to a single stacked column. */
  @media (max-width: 760px) {
    .columns { grid-template-columns: 1fr; }
    .panel { min-height: 320px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand"><a href="../">Cynic</a> · Playground</div>
    <div class="tag">strict-only ECMAScript, compiled to WebAssembly. No eval. That's the point.</div>
  </header>

  <div class="toolbar">
    <button id="run" type="button">Run</button>
    <button id="share" type="button">Copy link</button>
    <select id="mode" title="What to do with the source">
      <option value="eval">eval</option>
      <option value="bytecode">bytecode</option>
      <option value="ast">AST</option>
    </select>
    <select id="snippets" title="Load a sample">
      <option value="">— sample snippets —</option>
    </select>
    <span class="status" id="status">loading engine…</span>
  </div>

  <div class="columns">
    <div class="panel">
      <div class="panel-head"><span>source</span></div>
      <div id="editor-host"></div>
    </div>

    <div class="panel">
      <div class="panel-head"><span id="output-label">output</span></div>
      <pre class="output" id="output"><span class="out-empty">Run something. Cynic will judge it.</span></pre>
    </div>
  </div>

  <footer>
    Engine: <span id="version">cynic-wasm</span> ·
    <a href="../">project site</a> ·
    <a href="https://github.com/chicoxyzzy/cynic">source</a>
  </footer>

</div>
<script type="module" src="playground.js"></script>
</body>
</html>
