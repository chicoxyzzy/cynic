<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#70c0e8" />
<title>Cynic — Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  /* Palette lifted from the Cynic site (gh-pages/index.html) so the
     playground reads as part of the same project. */
  :root {
    --sky: #70c0e8;
    --skin: #ffd521;
    --skin-shade: #e8b800;
    --ink: #0c0c0c;
    --ink-soft: #2a2a2a;
    --bart: #dc4a38;
    --marge: #11a6d6;
    --grass: #6cbf3a;
    --paper: #fff8e6;
    --display: 'Bowlby One', sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --bd: 4px solid var(--ink);
    --bd-thick: 5px solid var(--ink);
    --shadow-sm: 6px 6px 0 var(--ink);
    --shadow-lg: 9px 9px 0 var(--ink);
    --radius: 16px;
    --radius-sm: 9px;
    --bounce: cubic-bezier(.34, 1.56, .64, 1);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
  }

  body {
    font-family: var(--mono);
    color: var(--ink);
    background: var(--sky);
    background-attachment: fixed;
    padding: 28px 20px 60px;
  }

  .wrap { max-width: 1160px; margin: 0 auto; }

  header {
    margin-bottom: 22px;
  }

  .brand {
    font-family: var(--display);
    font-size: 30px;
    letter-spacing: 0.02em;
    line-height: 1.1;
  }
  .brand a { color: var(--ink); text-decoration: none; }

  /* Tagline now sits under the title as a calmer subtitle. Used to
     float top-right; demoted because the tabs + Run are the real
     drama on this page. */
  .subtitle {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 4px;
    letter-spacing: 0;
  }

  button {
    font-family: var(--display);
    font-size: 14px;
    color: var(--ink);
    background: #fff;
    border: var(--bd);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-sm);
    padding: 8px 14px;
    cursor: pointer;
    transition: transform .12s var(--bounce), box-shadow .12s var(--bounce);
  }
  button:hover { transform: translate(-1px, -1px); box-shadow: var(--shadow-lg); }
  button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--ink); }
  button:disabled { opacity: 0.5; cursor: progress; transform: none; box-shadow: var(--shadow-sm); }

  /* Panel-head buttons are tighter than the page's stand-alone
     buttons so the head row stays compact. Same palette, slimmer
     border + shadow. */
  .panel-head .btn-primary,
  .panel-head .btn-secondary {
    font-size: 13px;
    border-width: 2px;
    padding: 5px 12px;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .panel-head .btn-primary:hover,
  .panel-head .btn-secondary:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 var(--ink);
  }
  .panel-head .btn-primary:active,
  .panel-head .btn-secondary:active {
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0 var(--ink);
  }
  .btn-primary { background: var(--grass); }
  .btn-secondary { background: var(--marge); color: #fff; }

  /* Snippet picker is a quiet, contextual control — no shadow, just
     a 2px ink border so it sits inside the panel head without
     competing with the action buttons. */
  .snippets-select {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink);
    background: rgba(255, 255, 255, 0.7);
    border: 2px solid var(--ink);
    border-radius: var(--radius-sm);
    box-shadow: none;
    padding: 4px 8px;
    max-width: 220px;
    cursor: pointer;
  }

  .status {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0;
  }

  /* The two-column working area: editor left, output right. */
  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
    align-items: stretch;
  }

  .panel {
    background: var(--paper);
    border: var(--bd);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    min-height: 460px;
    overflow: hidden; /* clip the head bar + editor to the rounded corners */
  }
  /* A hair of cartoon wobble — the two panels tilt opposite ways, like
     the marketing site's refusal cards. Straightens on hover. */
  .columns > .panel:first-child { transform: rotate(-0.4deg); }
  .columns > .panel:last-child  { transform: rotate(0.4deg); }
  .columns > .panel { transition: transform .15s var(--bounce); }
  .columns > .panel:hover { transform: rotate(0deg); }

  .panel-head {
    font-family: var(--display);
    font-size: 14px;
    letter-spacing: 0.04em;
    background: var(--skin);
    border-bottom: var(--bd);
    padding: 6px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex: 0 0 auto;
  }

  /* Right-side action cluster inside a panel head — Run / Copy link
     stay grouped while the snippet picker (or tabs) anchor the left. */
  .panel-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }

  /* --unhardened toggle: a muted checkbox + label that reads as a
     dev switch, not a primary action. */
  .toggle {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font: 13px/1 var(--mono, monospace);
    color: var(--ink-soft, #666);
    cursor: pointer;
    user-select: none;
  }
  .toggle input { margin: 0; cursor: pointer; }

  /* The CodeMirror editor host fills the left panel body. */
  #editor-host {
    flex: 1 1 auto;
    min-height: 0;
    overflow: auto;
  }

  /* CodeMirror theming — see playground.js for the EditorView theme
     that paints the --paper background, --ink text and --marge focus
     accent. The host just needs to let the view stretch. */
  #editor-host .cm-editor { height: 100%; }
  #editor-host .cm-scroller { font-family: var(--mono); }

  pre.output {
    margin: 0;
    padding: 14px;
    flex: 1 1 auto;
    min-height: 0;
    overflow: auto;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Each eval-output segment is its own block (like .bc-line and
     .out-hint). An inline <span> drops vertical margin/padding and
     draws border-top only across its line fragments, so the value
     marker and separator below misrendered until these went block. */
  .out-stdout { display: block; color: var(--ink); }
  .out-value { display: block; color: var(--ink-soft); }
  .out-value::before { content: "⇒ "; color: var(--grass); font-weight: 700; }
  .out-error { display: block; color: var(--bart); font-weight: 700; }
  .out-empty { display: block; color: var(--ink-soft); font-style: italic; }

  /* The dashed rule + spacing set the completion value (or a thrown
     error) off from the stdout above it — so it applies only when
     the value/error actually follows stdout, never when it is the
     sole line in the panel. */
  .out-stdout + .out-value,
  .out-stdout + .out-error {
    border-top: 2px dashed rgba(0, 0, 0, 0.25);
    padding-top: 10px;
    margin-top: 10px;
  }
  .out-stdout + .out-error { border-top-color: rgba(220, 74, 56, 0.4); }

  /* Inspector affordance hint — a one-off muted note at the top of the
     bytecode / AST panels telling the reader the lines are hoverable.
     Reuses the muted palette so it never competes with the disasm. */
  .out-hint {
    display: block;
    color: var(--ink-soft);
    font-style: italic;
    font-size: 12px;
    margin-bottom: 8px;
    opacity: 0.85;
  }

  /* Output-panel span-line decoration. Each disasm instruction or AST
     node line that carries a source `[start..end]` span gets `.span-line`
     and lights up on hover, paired with a CodeMirror range decoration
     over the matching source. `.span-active` is the reverse-direction
     highlight (cursor in editor over the span -> light up the line). */
  .bc-line { display: block; }
  .span-line { cursor: pointer; border-radius: 2px; }
  .span-line:hover, .span-active { background: var(--skin); }

  /* Disasm token coloring — same families as the CodeMirror syntax
     palette so the two panels feel like they speak the same
     language. The exact regex sees src/bytecode/disasm.zig output. */
  .bc-tok-offset { color: var(--ink-soft); }
  .bc-tok-mnem   { color: #9b1d8f; font-weight: 700; }
  .bc-tok-reg    { color: #1a64b8; }
  .bc-tok-index  { color: #b5500f; }
  .bc-tok-jump   { color: #0d7a8a; }
  .bc-tok-num    { color: #b5500f; }
  .bc-tok-paren  { color: var(--ink-soft); }

  /* AST-printer S-expression token coloring — mirrors the bytecode
     palette so the two inspector modes look related. See
     src/ast/printer.zig for the exact output shape. */
  .ast-tok-paren  { color: var(--ink-soft); }
  .ast-tok-head   { color: #9b1d8f; font-weight: 700; }
  .ast-tok-attr   { color: #1a64b8; }
  .ast-tok-string { color: #1f7a2e; }
  .ast-tok-num    { color: #b5500f; }
  .ast-tok-ident  { color: #0d7a8a; }

  /* Right-panel tab row. Replaces the toolbar mode <select>; clicking
     a tab switches the inspector view and re-runs the source. */
  .panel-head-tabs { padding: 6px 10px; }
  .mode-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .mode-tab {
    font-family: var(--display);
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--ink);
    background: rgba(255, 255, 255, 0.55);
    border: 2px solid var(--ink);
    border-radius: var(--radius-sm);
    box-shadow: none;
    padding: 4px 12px;
    cursor: pointer;
    transition: transform .12s var(--bounce), box-shadow .12s var(--bounce);
  }
  .mode-tab[aria-selected="true"] {
    background: #fff;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .mode-tab:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }

  footer {
    margin-top: 26px;
    font-size: 12px;
    color: var(--ink-soft);
    background: rgba(255, 255, 255, 0.55);
    padding: 8px 10px;
    display: inline-block;
  }
  footer a { color: var(--ink); }

  /* Narrow viewports: collapse to a single stacked column. */
  @media (max-width: 760px) {
    .columns { grid-template-columns: 1fr; }
    .panel { min-height: 320px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <a href="../">Cynic</a> · Playground
      <div class="subtitle">strict-only ECMAScript, compiled to WebAssembly. No eval. That's the point.</div>
    </div>
  </header>

  <div class="columns">
    <div class="panel">
      <div class="panel-head">
        <select id="snippets" class="snippets-select" title="Load a sample">
          <option value="">— sample snippets —</option>
        </select>
        <div class="panel-actions">
          <label class="toggle" title="Run with --unhardened — mutable primordials, no frozen globalThis. eval mode only.">
            <input type="checkbox" id="unhardened">
            <span>unhardened</span>
          </label>
          <button id="share" type="button" class="btn-secondary">Copy link</button>
          <button id="run" type="button" class="btn-primary" title="Run · Ctrl/Cmd+Enter">Run</button>
        </div>
      </div>
      <div id="editor-host"></div>
    </div>

    <div class="panel">
      <div class="panel-head panel-head-tabs">
        <div class="mode-tabs" role="tablist" aria-label="output mode">
          <button id="tab-eval" class="mode-tab" data-mode="eval" type="button" role="tab" aria-selected="true" aria-controls="output">eval</button>
          <button id="tab-bytecode" class="mode-tab" data-mode="bytecode" type="button" role="tab" aria-selected="false" aria-controls="output">bytecode</button>
          <button id="tab-ast" class="mode-tab" data-mode="ast" type="button" role="tab" aria-selected="false" aria-controls="output">AST</button>
        </div>
        <span class="status" id="status" aria-live="polite">loading engine…</span>
      </div>
      <pre class="output" id="output" role="tabpanel" tabindex="0" aria-labelledby="tab-eval"><span class="out-empty">Run something. Cynic will judge it.</span></pre>
    </div>
  </div>

  <footer>
    Engine: <span id="version">cynic-wasm</span> ·
    <a href="../">project site</a> ·
    <a href="https://github.com/chicoxyzzy/cynic">source</a>
  </footer>

</div>
<script type="module" src="app.js"></script>
</body>
</html>
